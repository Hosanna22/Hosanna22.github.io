<!DOCTYPE html>
<html lang="zh-CN">
<!-- 网页头部：设置标题、编码 -->
<head>
    <meta charset="UTF-8">
    <title>我的第一个 GitHub 主页</title>
    <!-- 简单加一点样式，让文字居中、有颜色 -->
    <style>
        body {
            background-color: #f5f5f5; /* 背景色 */
            text-align: center; /* 文字居中 */
            margin-top: 100px; /* 距离顶部距离 */
            font-family: 微软雅黑; /* 字体 */
        }
        h1 {
            color: #2c3e50; /* 标题颜色 */
        }
        p {
            color: #666; /* 段落颜色 */
            font-size: 18px; /* 字体大小 */
        }
        a {
            color: #3498db; /* 链接颜色 */
            text-decoration: none; /* 去掉下划线 */
        }
        a:hover {
            color: #e74c3c; /* 鼠标移上去变色 */
        }
    </style>
</head>
<!-- 网页身体：显示内容 -->
<body>
    <h1>你好！欢迎来到我的学习主页 😊</h1>
    <p>这是我用 GitHub Pages 搭建的第一个静态网页</p>
    <p>我的 GitHub 仓库：<a href="https://github.com/Hosanna22/Hosanna22.github.io" target="_blank">Hosanna22.github.io</a></p>
    <p>正在学习：Git + HTML + CSS</p>
</body>
</html>
